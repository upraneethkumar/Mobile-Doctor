<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Doctor — Don't Delay, Repair it Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: 'Inter Tight', -apple-system, system-ui, sans-serif;
    background: transparent;
    color: #efe7d4;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  html { scroll-behavior: smooth; }
  .md-desktop-header {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
  }
  .md-section-anchor { scroll-margin-top: 80px; }
  @media (max-width: 767px) {
    html, body, #root { height: 100%; overflow: hidden; }
  }
  /* Inner mobile site uses these */
  .md-scroll { scroll-behavior: smooth; }
  .md-scroll::-webkit-scrollbar { width: 0; display: none; }
  /* hide scrollbars on mobile site iframe content */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  /* Reveal animation base */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 1.1s cubic-bezier(.2,.7,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal-slow { transition-duration: 1.6s; }
  .reveal-fast { transition-duration: 0.7s; }
  @keyframes md-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes md-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes md-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes md-pulse-ring { 0% { transform: scale(.9); opacity: .8; } 100% { transform: scale(1.6); opacity: 0; } }
  @keyframes md-rise { from { opacity: 0; transform: translateY(40px); filter: blur(8px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
  @keyframes md-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes md-rotate { to { transform: rotate(360deg); } }
  @keyframes md-stretch { from { letter-spacing: 0.4em; opacity: 0; } to { letter-spacing: 0.04em; opacity: 1; } }
  @keyframes md-glint { 0%,100% { transform: translateX(-120%) skewX(-20deg); } 60%,100% { transform: translateX(120%) skewX(-20deg); } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="site.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="sections2.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
